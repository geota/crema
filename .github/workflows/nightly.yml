# Crema NIGHTLY pipeline — builds the app on every push to `main` and publishes it
# as a single rolling GitHub **prerelease** (tag `nightly`) for Obtainium. Follow
# this train in Obtainium by adding the repo and enabling "Include prereleases".
# The STABLE train is release.yml (tagged `v*.*.*`), served via IzzyOnDroid +
# Obtainium-without-prereleases.
#
# SAME package as stable — dev.maceiras.crema (the `nightly` buildType inherits
# `release`; NOT a separate ".nightly" app). It is RELEASE-signed with the same
# KEYSTORE_BASE64 secret release.yml uses, so Obtainium updates in place between a
# nightly prerelease and a tagged release. Absent the secret => debug-signed
# (installable, but a fresh key each run means users reinstall rather than update).

name: nightly

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Only the latest commit on main matters for a rolling nightly; cancel older runs.
concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: write # replace the rolling `nightly` prerelease + its asset

jobs:
  nightly:
    name: nightly (apk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute nightly version
        id: v
        run: |
          # Human-readable, sortable name; versionCode always sits above any stable
          # semver code (M*1e6 + m*1e3 + p) and strictly increases via the run number.
          NAME="$(date -u +%Y.%m.%d).${GITHUB_RUN_NUMBER}+g${GITHUB_SHA::7}"
          CODE=$((1000000000 + GITHUB_RUN_NUMBER))
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Nightly $NAME (versionCode $CODE)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + compileSdk platform (pinned to build.gradle.kts)
        run: sdkmanager "ndk;30.0.14904198" "platforms;android-37.0"

      - name: Install Rust toolchain (android target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache cargo + target (android, shared with release.yml)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target
          shared-key: rust-android

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore (if configured)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "Release keystore decoded — nightly APK will be release-signed (shares the stable signature)."
          else
            echo "::warning::No KEYSTORE_BASE64 set — nightly APK is DEBUG-signed (a new key each run, so users must reinstall rather than update between nightlies). Set the secret so the nightly shares the stable signature."
          fi

      # Debug cargo profile => fast per-commit CI. Add `-PcargoProfile=release` for
      # an optimized (slower-to-build) nightly if runtime perf matters more.
      - name: Build nightly APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.v.outputs.name }}
          VERSION_CODE: ${{ steps.v.outputs.code }}
        run: |
          ./gradlew :app:assembleNightly \
            -PversionName="$VERSION_NAME" -PversionCode="$VERSION_CODE" \
            --no-daemon --stacktrace

      - name: Collect APK
        env:
          VERSION_NAME: ${{ steps.v.outputs.name }}
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/nightly/app-nightly.apk \
            "dist/crema-nightly-${VERSION_NAME}.apk"
          ls -la dist

      # Roll the single `nightly` prerelease forward: delete the old one (+ its tag)
      # so the new release points at this commit and Obtainium sees one clean entry.
      - name: Remove previous nightly release + tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete nightly --yes --cleanup-tag || true

      - name: Publish rolling nightly prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          target_commitish: ${{ github.sha }}
          name: Crema Nightly
          prerelease: true
          make_latest: false
          body: |
            Rolling development build — **the latest commit on `main`**.

            Same app as stable (`dev.maceiras.crema`), release-signed — so **Obtainium**
            updates it in place. Follow this train with **Include prereleases** enabled;
            for stable only, leave that off (or use IzzyOnDroid / a tagged release).
            Moving from a nightly *back* to stable is a downgrade, so it needs a manual
            reinstall.

            Commit: ${{ github.sha }}
          files: dist/*.apk
          fail_on_unmatched_files: true
