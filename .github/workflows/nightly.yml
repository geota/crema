# Crema NIGHTLY pipeline — builds the app on every push to `main` and publishes it
# as a single rolling GitHub **prerelease** (tag `nightly`) for Obtainium. Follow
# this train in Obtainium by adding the repo and enabling "Include prereleases".
# The STABLE train is release.yml (tagged `v*.*.*`), served via IzzyOnDroid +
# Obtainium-without-prereleases.
#
# SAME package as stable — dev.maceiras.crema (the `nightly` buildType inherits
# `release`; NOT a separate ".nightly" app). It is RELEASE-signed with the same
# KEYSTORE_BASE64 secret release.yml uses, so Obtainium updates in place between a
# nightly prerelease and a tagged release. Absent the secret => debug-signed
# (installable, but a fresh key each run means users reinstall rather than update).

name: nightly

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Only the latest commit on main matters for a rolling nightly; cancel older runs.
concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: write # replace the rolling `nightly` prerelease + its asset

jobs:
  nightly:
    name: nightly (apk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags: the versionCode is derived from the last release
          fetch-tags: true

      - name: Compute nightly version
        id: v
        run: |
          # Slot the nightly BETWEEN its base release and the next one, using the
          # SAME scheme as release.yml (M*1e8 + m*1e6 + p*1e4). The 4 low digits
          # carry commits-since-the-last-tag, so a nightly is always > its base
          # release and < the next tagged release — every future release then
          # upgrades in place with no manual reinstall. (One-time exception: an
          # install from the OLD 1e9-based nightly is a downgrade and reinstalls
          # once.)
          LAST="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)"
          LAST="${LAST:-v0.0.0}"
          if [[ "${LAST#v}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            MAJ=${BASH_REMATCH[1]}; MIN=${BASH_REMATCH[2]}; PAT=${BASH_REMATCH[3]}
          else
            MAJ=0; MIN=0; PAT=0
          fi
          C="$(git rev-list --count "${LAST}..HEAD" 2>/dev/null || git rev-list --count HEAD)"
          [ "$C" -gt 9999 ] && C=9999 # never overflow into the patch digit
          CODE=$(( MAJ * 100000000 + MIN * 1000000 + PAT * 10000 + C ))
          NAME="${LAST#v}-nightly.${C}+g${GITHUB_SHA::7}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Nightly $NAME (versionCode $CODE) — base $LAST + $C commit(s)"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK + compileSdk platform (pinned to build.gradle.kts)
        run: sdkmanager "ndk;30.0.14904198" "platforms;android-37.0"

      - name: Install Rust toolchain (android target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache cargo + target (android, shared with release.yml)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target
          shared-key: rust-android

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v6

      - name: Decode release keystore (if configured)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "Release keystore decoded — nightly APK will be release-signed (shares the stable signature)."
          else
            echo "::warning::No KEYSTORE_BASE64 set — nightly APK is DEBUG-signed (a new key each run, so users must reinstall rather than update between nightlies). Set the secret so the nightly shares the stable signature."
          fi

      # Debug cargo profile => fast per-commit CI. Add `-PcargoProfile=release` for
      # an optimized (slower-to-build) nightly if runtime perf matters more.
      - name: Build nightly APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          # Prod Android OAuth clients — the nightly shares dev.maceiras.crema and
          # the release signature, so it uses the same registered clients. Without
          # these the `release` buildType falls back to "" (+ the "unconfigured"
          # Drive redirect scheme) and Visualizer / Google Drive sign-in is dead.
          VISUALIZER_CLIENT_ID: ${{ secrets.VISUALIZER_CLIENT_ID }}
          GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          VERSION_NAME: ${{ steps.v.outputs.name }}
          VERSION_CODE: ${{ steps.v.outputs.code }}
        run: |
          ./gradlew :app:assembleNightly \
            -PversionName="$VERSION_NAME" -PversionCode="$VERSION_CODE" \
            --no-daemon --stacktrace

      - name: Collect APK
        env:
          VERSION_NAME: ${{ steps.v.outputs.name }}
        run: |
          mkdir -p dist
          out=android/app/build/outputs/apk/nightly
          base="crema-nightly-${VERSION_NAME}"
          cp "$out/app-nightly.apk" "dist/$base.apk"
          # v4 signature sidecar (incremental install / Obtainium), when present.
          [ -f "$out/app-nightly.apk.idsig" ] && cp "$out/app-nightly.apk.idsig" "dist/$base.apk.idsig" || true
          # SHA-256 checksum for verification, next to the APK.
          ( cd dist && sha256sum "$base.apk" > "$base.apk.sha256" )
          ls -la dist

      # Roll the single `nightly` prerelease forward: delete the old one (+ its tag)
      # so the new release points at this commit and Obtainium sees one clean entry.
      - name: Remove previous nightly release + tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete nightly --yes --cleanup-tag || true

      - name: Publish rolling nightly prerelease
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          target_commitish: ${{ github.sha }}
          name: Crema Nightly
          prerelease: true
          make_latest: false
          body: |
            Rolling development build — **the latest commit on `main`**.

            Same app as stable (`dev.maceiras.crema`), release-signed — so **Obtainium**
            updates it in place. Follow this train with **Include prereleases** enabled;
            for stable only, leave that off (or use IzzyOnDroid / a tagged release).
            Moving from a nightly *back* to stable is a downgrade, so it needs a manual
            reinstall.

            Commit: ${{ github.sha }}
          # APK + its v4 `.idsig` + `.sha256`; GitHub adds the source-code archives
          # for the `nightly` tag automatically.
          files: |
            dist/*.apk
            dist/*.idsig
            dist/*.sha256
          fail_on_unmatched_files: false
