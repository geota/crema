// Compose compiler stability configuration (review #43d / deferred #37).
//
// Kotlin's collection interfaces are UNSTABLE to the Compose compiler (a
// List could be an ArrayList mutated in place), so any composable taking a
// List/Set/Map parameter — or a class containing one, like MainUiState —
// can never be skipped: it re-executes on every parent recomposition, i.e.
// on every ~25 Hz telemetry tick while a shot runs and every idle-heating
// tick otherwise.
//
// This codebase only ever REPLACES collections (immutable snapshot style:
// MainUiState.copy(...) with wholesale new lists), never mutates them in
// place, so declaring them stable is sound and restores parameter-equality
// skipping for the profile/bean/history pickers, the Brew header, and every
// other list-taking subtree.
kotlin.collections.*
