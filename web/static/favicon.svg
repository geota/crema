<!-- Crema favicon — matches the in-app top-left brand glyph (CremaSidebar
     `.cside-mark-glyph`, defined in `quick-controls-v2.css:478`):
     copper-500 disc (#C7763B) + ink-900 (#1F1812) "C" in Newsreader serif,
     weight 500, with the same slight glyph asymmetry the live `<div>`
     produces. Falls back to Georgia → Times → generic serif for clients
     without Newsreader; the visual offset of a serif "C" reads the same. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="32" fill="#C7763B" />
  <text
    x="32"
    y="34"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Newsreader, Georgia, 'Times New Roman', serif"
    font-size="40"
    font-weight="500"
    fill="#1F1812"
  >C</text>
</svg>
